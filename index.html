<!DOCTYPE html>
<html lang="ja">
<head>

    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'sakura-pink': '#ffb7c5',
                        'sakura-light': '#fff5f7',
                        'sakura-deep': '#ff8da1',
                    },
                    fontFamily: {
                        serif: ['"Playfair Display"', 'serif'],
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #fff5f7;
            color: #171717;
            overflow-x: hidden;
            font-family: 'Inter', sans-serif;
        }

        .writing-vertical {
            writing-mode: vertical-rl;
        }

        .sakura-petal {
            pointer-events: none;

        /* Selection color */

<body>
    <div id="root"></div>

    <!-- Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;
        const { motion, AnimatePresence, useScroll, useTransform } = Motion;

        // --- Lucide Icon Component ---
        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);
            
            useEffect(() => {
                if (iconRef.current) {
                    lucide.createIcons({
                        attrs: {
                            'stroke-width': 2,
                            'stroke': 'currentColor',
                            'width': size,
                            'height': size,
                            'class': className
                        },
                        nameAttr: 'data-lucide',
                        icons: lucide.icons
                    });
                }
            }, [name, size, className]);

            return <i data-lucide={name} ref={iconRef} className={`inline-block ${className}`} style={{ width: size, height: size }}></i>;
        };

        // --- Fallback Data ---
        const fallbackData = [
            { date: "2026.04.15", event: "春の癒やしマルシェ出店", time_range: "10:00 - 16:00", location: "〇〇広場", url: "https://www.instagram.com/kenkazu1105/", map_url: "https://maps.google.com/" },
            { date: "2026.04.22", event: "エンヨー実演販売会", time_range: "11:00 - 17:00", location: "Diamond Sweet Pea 店内", url: "", map_url: "" },
            { date: "2026.05.03", event: "GWデトックスキャンペーン", time_range: "10:00 - 18:00", location: "YOSA PARK", url: "https://line.me/", map_url: "" }
        ];

        // --- Sakura Petal Component ---
        const SakuraPetal = ({ id }) => {
            const initialX = useMemo(() => Math.random() * 100, []);
            const duration = useMemo(() => 10 + Math.random() * 20, []);
            const delay = useMemo(() => Math.random() * 10, []);
            const size = useMemo(() => 10 + Math.random() * 15, []);
            const rotation = useMemo(() => Math.random() * 360, []);

            return (
                <motion.div
                    className="sakura-petal fixed top-[-20px] opacity-60 z-0"
                    initial={{ left: `${initialX}%`, y: -20, rotate: rotation, scale: 0.5 }}
                    animate={{
                        y: "110vh",
                        x: [`${initialX}%`, `${initialX + (Math.random() * 10 - 5)}%`, `${initialX + (Math.random() * 20 - 10)}%`],
                        rotate: rotation + 720,
                        scale: [0.5, 1, 0.8]
                    }}
                    transition={{ duration: duration, repeat: Infinity, delay: delay, ease: "linear" }}
                    style={{
                        width: size,
                        height: size * 0.8,
                        background: "radial-gradient(circle, #ffb7c5 0%, #ffd1dc 100%)",
                        borderRadius: "100% 0% 100% 0% / 100% 0% 100% 0%",
                    }}
                />
            );
        };

        const SakuraBackground = () => {
            const petals = useMemo(() => Array.from({ length: 25 }, (_, i) => i), []);
            return (
                <div className="fixed inset-0 pointer-events-none z-0">
                    {petals.map((id) => <SakuraPetal key={id} id={id} />)}
                </div>
            );
        };

        // --- Main App Component ---
        function App() {
            const [schedule, setSchedule] = useState(fallbackData);
            const [formData, setFormData] = useState({ name: "", email: "", subject: "YOSAのご予約について", message: "" });
            const { scrollYProgress } = useScroll();

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({ ...prev, [name]: value }));
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                const mailtoLink = `mailto:kenkazu1105@icloud.com?subject=${encodeURIComponent(formData.subject)}&body=${encodeURIComponent(
                    `お名前: ${formData.name}\nメールアドレス: ${formData.email}\n\nメッセージ:\n${formData.message}`
                )}`;
                window.location.href = mailtoLink;
            };

            // 【重要】ここにスプレッドシートの「ウェブに公開（CSV）」で取得したURLを貼り付けます
            // 例: "https://docs.google.com/spreadsheets/d/e/2PACX-xxxxxxx/pub?output=csv"
            const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vReBRDXoMYEb3LxOVmaa_m62latUNmw6ggQog4YcPpQ-lK-VeN3mB4HSdCYfAKA7sWhXHhMkwiAJFDs/pub?gid=0&single=true&output=csv";

            useEffect(() => {
                const fetchSchedule = async () => {
                    // URLが初期値（日本語のまま）の場合は、取得処理を行わず仮データを表示し続ける
                    if (!SHEET_CSV_URL.startsWith("http")) return;

                    try {
                        const response = await fetch(SHEET_CSV_URL);
                        if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                        const csvText = await response.text();
                        
                        Papa.parse(csvText, {
                            header: false, // 見出し名に依存せず、A列=0, B列=1という「列の順番」でデータを取得する設定
                            skipEmptyLines: 'greedy',
                            complete: (results) => {
                                if (results.data && results.data.length > 1) {
                                    // 1行目（見出し）を飛ばして、2行目から処理を開始（slice(1)）
                                    const validData = results.data.slice(1).map(cells => ({
                                        // A列=0(日付), B列=1(イベント), C列=2(時間), D列=3(場所), E列=4(URL), F列=5(MapURL)
                                        date: cells[0] ? cells[0].trim() : "",
                                        event: cells[1] ? cells[1].trim() : "",
                                        time_range: cells[2] ? cells[2].trim() : "",
                                        location: cells[3] ? cells[3].trim() : "",
                                        url: cells[4] ? cells[4].trim() : "",
                                        map_url: cells[5] ? cells[5].trim() : ""
                                    })).filter(item => item.date || item.event); // 日付かイベント名のどちらかがあれば有効なデータとする
                                    
                                    if (validData.length > 0) {
                                        setSchedule(validData);
                                    }
                                }
                            }
                        });
                    } catch (error) { 
                        console.error("Failed to fetch schedule. Showing fallback data.", error); 
                    }
                };
                fetchSchedule();
            }, []);

            const heroOpacity = useTransform(scrollYProgress, [0, 0.2], [1, 0]);
            const heroScale = useTransform(scrollYProgress, [0, 0.2], [1, 0.95]);

                            Diamond Sweet Pea
                        </motion.div>
                        <div className="hidden md:flex gap-12 text-xs uppercase tracking-[0.3em] font-medium">
                            {["Story", "Services", "Schedule", "Contact"].map((item) => (

                        </div>

                            <div className="flex flex-col md:flex-row items-center justify-center gap-8">
                                <div className="h-[1px] w-24 bg-neutral-300 hidden md:block" />
                                <p className="text-lg md:text-xl font-serif italic text-neutral-600">Diamond Sweet Pea — kenkazu1105</p>
                                <div className="h-[1px] w-24 bg-neutral-300 hidden md:block" />
                            </div>
                        </motion.div>
                    </section>

                    <section id="story" className="relative py-32 px-6 lg:px-24 bg-white/40 backdrop-blur-sm overflow-hidden">
                        <div className="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-16 items-start">
                            <div className="lg:col-span-5 relative">
                                <motion.div initial={{ opacity: 0, scale: 0.9 }} whileInView={{ opacity: 1, scale: 1 }} viewport={{ once: true }} className="aspect-[3/4] bg-neutral-100 rounded-t-[200px] overflow-hidden relative shadow-2xl">
                                    <img src="src/mk.png" alt="Story" className="w-full h-full object-cover grayscale transition-all duration-700" />
                                    <div className="absolute inset-0 bg-sakura-pink/10 mix-blend-multiply" />
                                </motion.div>
                                <p className="mt-6 text-xs text-neutral-400 font-serif italic text-center">実演販売でENJOの魅力を伝える様子</p>
                            </div>
                            <div className="lg:col-span-7 pt-12">

                                        <p className="text-lg">その経験の中で感じた「心身の健康」の大切さ。2019年10月、自らの想いを形にするため、美容と健康のサービス業「Diamond Sweet Pea」を開業しました。</p>
                                        <div className="pt-8 border-t border-neutral-200">
                                            <div className="flex items-center gap-4 mb-4">
                                                <div className="w-12 h-[1px] bg-sakura-deep" />
                                                <span className="text-xs uppercase tracking-widest font-bold text-neutral-400">Timeline</span>
                                            </div>
                                            <ul className="space-y-4 font-serif italic">
                                                <li className="flex gap-4"><span className="text-sakura-deep font-bold">1994-2019</span><span>営業職として多忙な日々を過ごす</span></li>
                                                <li className="flex gap-4"><span className="text-sakura-deep font-bold">2019.10</span><span>Diamond Sweet Pea 開業</span></li>
                                                <li className="flex gap-4"><span className="text-sakura-deep font-bold">2022-</span><span>「エンヨーLIFE」正規販売店として活動開始</span></li>
                                            </ul>
                                        </div>
                                    </div>
                                </motion.div>
                            </div>
                        </div>
                    </section>

                    <section id="services" className="relative py-32 px-6 overflow-hidden">
                        <div className="max-w-7xl mx-auto">
                            <div className="flex flex-col md:flex-row justify-between items-end mb-24 gap-8">
                                <h2 className="text-6xl md:text-8xl font-serif tracking-tighter">Services</h2>
                                <p className="max-w-xs text-sm text-neutral-500 leading-relaxed">心身を芯から温めるYOSAと、地球に優しい暮らしを提案するエンヨー。二つのアプローチで、あなたの毎日を豊かに。</p>
                            </div>
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-12 lg:gap-24">
                                <motion.div initial={{ opacity: 0, y: 50 }} whileInView={{ opacity: 1, y: 0 }} viewport={{ once: true }} className="group relative">
                                    <div className="aspect-[4/5] overflow-hidden rounded-2xl mb-8 relative">
                                        <img src="https://images.unsplash.com/photo-1544161515-4ab6ce6db874?auto=format&fit=crop&q=80&w=1000" alt="YOSA" className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" />
                                        <div className="absolute inset-0 bg-neutral-900/20 group-hover:bg-neutral-900/10 transition-colors" />
                                        <div className="absolute bottom-8 left-8 text-white">
                                            <span className="text-xs uppercase tracking-[0.3em] font-bold mb-2 block">Relaxation</span>

                                        </div>
                                    </div>
                                    <div className="pl-4">

                                        <div className="flex flex-wrap gap-3 mb-10">
                                            {["滝汗", "デトックス", "ダイエット", "温活"].map(tag => <span key={tag} className="px-4 py-1 rounded-full border border-neutral-200 text-xs text-neutral-500 italic">#{tag}</span>)}

                                        <a href="#" className="inline-flex items-center gap-4 px-8 py-4 bg-sakura-deep text-white rounded-full hover:bg-sakura-pink transition-colors font-medium shadow-lg shadow-sakura-pink/20">U+WORD会員様 限定予約 <Icon name="arrow-right" size={18} /></a>
                                    </div>
                                </motion.div>
                                <motion.div initial={{ opacity: 0, y: 50 }} whileInView={{ opacity: 1, y: 0 }} viewport={{ once: true }} transition={{ delay: 0.2 }} className="group relative lg:mt-32">
                                    <div className="aspect-[4/5] overflow-hidden rounded-2xl mb-8 relative">
                                        <img src="https://images.unsplash.com/photo-1584622650111-993a426fbf0a?auto=format&fit=crop&q=80&w=1000" alt="ENJO" className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" />
                                        <div className="absolute inset-0 bg-neutral-900/20 group-hover:bg-neutral-900/10 transition-colors" />

                                            <h3 className="text-3xl font-serif">エンヨーLIFE</h3>
                                        </div>
                                    </div>

                                        <h4 className="text-2xl font-serif mb-4">オーストリア生まれの魔法の掃除</h4>
                                        <p className="text-neutral-600 mb-8 leading-relaxed">水だけで汚れが落ちる、化学薬品を一切使わないお掃除用品「ENJO（エンヨー）」。対面販売にこだわり、皆様の暮らしに合わせた最適な使い方を直接お伝えしています。</p>
                                        <div className="flex flex-wrap gap-3 mb-10">

                                    </div>

                                        <div className="space-y-2">

                                            <input type="email" name="email" value={formData.email} onChange={handleInputChange} className="w-full px-0 py-3 border-b border-neutral-200 focus:border-sakura-deep outline-none transition-colors bg-transparent" placeholder="メールアドレス" required />
